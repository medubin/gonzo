language: typescript
file_ext: .ts
primitives:
  string: string
  int32: number
  int64: number
  float32: number
  float64: number
  bool: boolean
type_patterns:
  repeated: "Array<%s>"
  map: "Record<%s, %s>"
  default: "any"
default_imports: []
settings:
  package_comment: "// Generated by API code generator"
  client_base_url: "string"
templates:
  types: |
    {{.Settings.PackageComment}}

    {{range .Enums}}
    {{if .Comments}}{{formatComments .Comments}}
    {{end}}export enum {{.Name}} {
    {{$enumName := .Name}}{{$baseType := .BaseType}}{{range .Values}}  {{.Key}} = {{if eq $baseType "string"}}{{quote .Value}}{{else}}{{.Value}}{{end}},
    {{end}}}
    {{end}}

    {{range .Types}}
    {{if .Comments}}{{formatComments .Comments}}
    {{end}}{{if eq .Kind "alias"}}export type {{.Name}} = {{.MappedType}};
    {{else if eq .Kind "struct"}}export interface {{.Name}} {
    {{range .Fields}}{{if .Comments}}{{formatComments .Comments | indent 1}}
    {{end}}  {{.Name}}{{if not .Required}}?{{end}}: {{.Type}};
    {{end}}}
    {{else if eq .Kind "repeated"}}export type {{.Name}} = {{.MappedType}};
    {{else if eq .Kind "map"}}export type {{.Name}} = {{.MappedType}};
    {{end}}
    {{end}}

    {{range .Servers}}{{range .Endpoints}}{{if .PathParams}}export interface {{.Name}}Params {
    {{range .PathParams}}  {{.Name}}: {{.Type}};
    {{end}}}
    {{end}}{{end}}{{end}}

  client: |
    {{.Settings.PackageComment}}
    {{$usedTypes := getUsedTypes .}}
    {{if $usedTypes}}import { {{range $i, $type := $usedTypes}}{{if $i}}, {{end}}{{$type.Name}}{{end}} } from './types';{{end}}

    export interface RequestOptions {
      headers?: Record<string, string>;
      timeout?: number;
    }

    {{range .Servers}}
    {{if .Comments}}{{formatComments .Comments}}
    {{end}}export class {{.Name}}Client {
      constructor(private baseUrl: string) {}

    {{range .Endpoints}}{{if .Comments}}{{formatComments .Comments | indent 1}}
    {{end}}  async {{camelCase .Name}}({{if .HasBody}}body: {{.BodyType | replace "*" ""}}, {{end}}{{if .PathParams}}params: {{.Name}}Params, {{end}}{{if .HasParams}}parameters: {{.Parameters}}, {{end}}options?: RequestOptions): Promise<{{.ReturnType | replace "*" ""}}> {
        let url = `${this.baseUrl}{{.Path}}`;
        {{if .PathParams}}
        // Replace path parameters
        {{range .PathParams}}url = url.replace('{{printf "{%s}" .Name}}', String(params.{{.Name}}));
        {{end}}{{end}}
        
        {{if .HasParams}}
        // Add query parameters
        const searchParams = new URLSearchParams();
        Object.entries(parameters).forEach(([key, value]) => {
          if (value !== undefined) {
            searchParams.append(key, String(value));
          }
        });
        if (searchParams.toString()) {
          url += '?' + searchParams.toString();
        }
        {{end}}

        const response = await fetch(url, {
          method: '{{.Method}}',
          {{if .HasBody}}body: JSON.stringify(body),
          headers: {
            'Content-Type': 'application/json',
            ...options?.headers
          },{{else}}headers: options?.headers,{{end}}
          signal: options?.timeout ? AbortSignal.timeout(options.timeout) : undefined
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        return response.json();
      }
    {{end}}}
    {{end}}