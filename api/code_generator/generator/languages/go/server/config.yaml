language: go
file_ext: .go
primitives:
  string: string
  int32: int32
  int64: int64
  float32: float32
  float64: float64
  bool: bool
type_patterns:
  repeated: "[]%s"
  map: "map[%s]%s"
  default: "struct{}"
default_imports:
  - context
  - github.com/medubin/gonzo/api/src/cookies
  - github.com/medubin/gonzo/api/src/handle
  - github.com/medubin/gonzo/api/src/router
  - github.com/medubin/gonzo/api/src/url
settings:
  package_comment: "// Package generated by API code generator"
  types_imports:
    - fmt
    - reflect
  endpoint_imports:
    - context
    - github.com/medubin/gonzo/api/src/cookies
    - github.com/medubin/gonzo/api/src/gerrors
    - github.com/medubin/gonzo/api/src/url
templates:
  types: |
    {{.Settings.PackageComment}}
    package {{.PackageName}}
    
    import (
    {{range .Settings.TypesImports}}	"{{.}}"
    {{end}})
    {{range .Enums}}
    {{if .Comments}}{{formatComments .Comments}}
    {{end}}type {{.Name}} {{mapType .BaseType}}
    const (
    {{$enumName := .Name}}{{$baseType := .BaseType}}{{range .Values}}	{{$enumName}}_{{.Key}} {{$enumName}} = {{if eq $baseType "string"}}{{quote .Value}}{{else}}{{.Value}}{{end}}
    {{end}}){{end}}
    {{range .Types}}
    {{if .Comments}}{{formatComments .Comments}}
    {{end}}{{if eq .Kind "alias"}}type {{.Name}} {{.MappedType}}
    {{else if eq .Kind "struct"}}type {{.Name}} struct {
    {{range .Fields}}{{if .Comments}}{{formatComments .Comments | indent 1}}
    {{end}}  {{capitalize .Name}} {{if .Required}}{{.Type}}{{else}}*{{.Type}}{{end}} `json:"{{.JSONTag}}"`
    {{end}}}

    func (v {{.Name}}) Validate() error {
    {{range .Fields}}{{if .Required}}  if {{if eq .Type "string"}}v.{{capitalize .Name}} == ""{{else if or (eq .Type "int32") (eq .Type "int64") (eq .Type "float32") (eq .Type "float64")}}v.{{capitalize .Name}} == 0{{else if eq .Type "bool"}}false{{else}}reflect.ValueOf(v.{{capitalize .Name}}).IsZero(){{end}} {
        return fmt.Errorf("field '{{.Name}}' is required")
      }
    {{end}}{{end}}  return nil
    }
    {{else if eq .Kind "repeated"}}type {{.Name}} {{.MappedType}}
    {{else if eq .Kind "map"}}type {{.Name}} {{.MappedType}}
    {{end}}{{end}}
    {{range .Servers}}{{range .Endpoints}}{{if .PathParams}}// URL parameters for {{.Name}}
    type {{.Name}}Url struct {
    {{range .PathParams}}	{{capitalize .Name}} *{{.Type}} `url:"{{.Name}}"`
    {{end}}}{{end}}{{end}}{{end}}
  server: |
    {{.Settings.PackageComment}}
    package {{.PackageName}}

    import (
    {{range .Imports}}	"{{.}}"
    {{end}})

    {{range .Servers}}
    {{if .Comments}}{{formatComments .Comments}}
    {{end}}type {{.Name}} interface {
    {{range .Endpoints}}{{if .Comments}}{{formatComments .Comments | indent 1}}
    {{end}}	{{.Name}}(ctx context.Context, body {{.BodyType}}, cookie cookies.Cookies, url url.URL[{{if .HasParams}}{{.Parameters}}{{else}}struct{}{{end}}, {{.URLType}}]) ({{.ReturnType}}, error)
    {{end}}}

    func Start{{.Name}}(s {{.Name}}, r *router.Router) {
    {{range .Endpoints}}	r.Route("{{.Method}}", "{{.Path}}", handle.Handle[{{.BodyType | replace "*" ""}}, {{.ReturnType | replace "*" ""}}, {{if .HasParams}}{{.Parameters}}{{else}}struct{}{{end}}, {{.URLType}}](s.{{.Name}}))
    {{end}}}
    {{end}}

  endpoint: |
    package {{.PackageName}}

    import (
    {{range .Settings.EndpointImports}}	"{{.}}"
    {{end}})

    {{if .Endpoint.Comments}}{{formatComments .Endpoint.Comments}}
    {{end}}// {{.Endpoint.Method}} {{.Endpoint.Path}}
    func (s *{{.Server.Name}}Impl) {{.Endpoint.Name}}(ctx context.Context, body {{.Endpoint.BodyType}}, cookie cookies.Cookies, url url.URL[{{if .Endpoint.HasParams}}{{.Endpoint.Parameters}}{{else}}struct{}{{end}}, {{.Endpoint.URLType}}]) ({{.Endpoint.ReturnType}}, error) {
      return nil, gerrors.UnimplementedError("{{.Endpoint.Name}}")
    }
  server_impl: |
    {{.Settings.PackageComment}}
    package {{.PackageName}}

    {{range .Servers}}
    {{if .Comments}}{{formatComments .Comments}}
    {{end}}type {{.Name}}Impl struct {
    	// Add your server implementation fields here
    }
    {{end}}
