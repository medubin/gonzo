language: typescript
file_ext: .ts
primitives:
  string: string
  int32: number
  int64: number
  float32: number
  float64: number
  bool: boolean
  file: "File | Blob | { uri: string; type: string; name: string }"
type_patterns:
  repeated: "Array<%s>"
  map: "Record<%s, %s>"
  default: "unknown"
default_imports: []
settings:
  package_comment: "// Generated by API code generator"
  client_base_url: "string"
  error_codes_source: "../../../../../runtime/gerrors/errors.go"
templates:
  errors: |
    {{.Settings.PackageComment}}

    export type ErrorCode ={{range .ErrorCodes}}
      | '{{.Code}}'{{end}};

    export class GonzoError extends Error {
      readonly code: ErrorCode;
      readonly statusCode: number;

      constructor(code: ErrorCode, message: string, statusCode: number) {
        super(message);
        this.name = 'GonzoError';
        this.code = code;
        this.statusCode = statusCode;
      }
    }
    {{range .ErrorCodes}}
    export class {{.ClassName}} extends GonzoError {
      constructor(message: string, statusCode = {{.StatusCode}}) {
        super('{{.Code}}', message, statusCode);
        this.name = '{{.ClassName}}';
      }
    }
    {{end}}
    export async function parseGonzoError(response: Response): Promise<GonzoError> {
      const statusCode = response.status;
      let code: ErrorCode = 'internal';
      let message = response.statusText || 'unknown error';

      try {
        const body = await response.json();
        if (body.error && typeof body.error === 'string') {
          const colonIdx = body.error.indexOf(': ');
          if (colonIdx !== -1) {
            code = body.error.substring(0, colonIdx) as ErrorCode;
            message = body.error.substring(colonIdx + 2);
          } else {
            message = body.error;
          }
        }
      } catch (_) {}

      switch (code) {
        {{range .ErrorCodes}}case '{{.Code}}': return new {{.ClassName}}(message, statusCode);
        {{end}}default: return new GonzoError('internal', message, statusCode);
      }
    }

  types: |
    {{.Settings.PackageComment}}

    {{range .Enums}}
    {{if .Comments}}{{formatComments .Comments}}
    {{end}}export type {{.Name}} = {{$enumName := .Name}}{{$baseType := .BaseType}}{{range $i, $val := .Values}}{{if $i}} | {{end}}{{if eq $baseType "string"}}{{quote .Value}}{{else}}{{.Value}}{{end}}{{end}};

    const {{camelCase .Name}}Values = [{{$bt := .BaseType}}{{range $i, $val := .Values}}{{if $i}}, {{end}}{{if eq $bt "string"}}{{quote $val.Value}}{{else}}{{$val.Value}}{{end}}{{end}}] as const;

    export function isValid{{.Name}}(v: unknown): v is {{.Name}} {
      return ({{camelCase .Name}}Values as readonly unknown[]).includes(v);
    }

    export function parse{{.Name}}(v: {{mapType .BaseType}}): {{.Name}} {
      if (!isValid{{.Name}}(v)) {
        throw new Error(`Invalid {{.Name}} value: ${String(v)}`);
      }
      return v;
    }
    {{end}}

    {{range .Types}}
    {{if .Comments}}{{formatComments .Comments}}
    {{end}}{{if eq .Kind "alias"}}export type {{.Name}} = {{.MappedType}};
    {{else if eq .Kind "struct"}}export interface {{.Name}} {
    {{range .Fields}}{{if .Comments}}{{formatComments .Comments | indent 1}}
    {{end}}  {{camelCase .Name}}{{if not .Required}}?{{end}}: {{.Type}};
    {{end}}}
    {{else if eq .Kind "repeated"}}export type {{.Name}} = {{.MappedType}};
    {{else if eq .Kind "map"}}export type {{.Name}} = {{.MappedType}};
    {{end}}
    {{end}}

    {{range .Servers}}{{range .Endpoints}}{{if .PathParams}}export interface {{.Name}}Params {
    {{range .PathParams}}  {{.Name}}: {{.Type}};
    {{end}}}
    {{end}}{{end}}{{end}}

  client: |
    {{.Settings.PackageComment}}
    {{$usedTypes := getUsedTypes .}}
    {{if $usedTypes}}import type { {{range $i, $type := $usedTypes}}{{if $i}}, {{end}}{{$type.Name}}{{end}} } from './types';{{end}}
    import { parseGonzoError } from './errors';

    export interface RequestOptions {
      headers?: Record<string, string>;
      timeout?: number;
    }
    {{range .Servers}}
    {{if .Comments}}{{formatComments .Comments}}
    {{end}}export class {{.Name}}Client {
      private baseUrl: string
      constructor(baseUrl: string) {
        this.baseUrl = baseUrl;
      }

    {{range .Endpoints}}{{if .Comments}}{{formatComments .Comments | indent 1}}
    {{end}}  async {{camelCase .Name}}({{if .HasBody}}body: {{.BodyType | replace "*" ""}}, {{end}}{{if .PathParams}}params: {{.Name}}Params, {{end}}{{if .HasParams}}parameters: {{.Parameters}}, {{end}}options?: RequestOptions): Promise<{{.ReturnType | replace "*" ""}}> {
        {{if or .PathParams .HasParams}}let{{else}}const{{end}} url = `${this.baseUrl}{{.Path}}`;
        {{if .PathParams}}
        // Replace path parameters
        {{range .PathParams}}url = url.replace('{{printf "{%s}" .Name}}', String(params.{{.Name}}));{{end}}{{end}}
        {{if .HasParams}}
        // Add query parameters
        const searchParams = new URLSearchParams();
        Object.entries(parameters).forEach(([key, value]) => {
          if (value !== undefined) {
            searchParams.append(key, String(value));
          }
        });
        if (searchParams.toString()) {
          url += '?' + searchParams.toString();
        }
        {{end}}
        {{if and .HasBody .IsMultipart}}const formData = new FormData();
        {{range .BodyFields}}{{if .IsFile}}{{if .Required}}formData.append('{{camelCase .Name}}', body.{{camelCase .Name}} as any);
        {{else}}if (body.{{camelCase .Name}} !== undefined && body.{{camelCase .Name}} !== null) {
          formData.append('{{camelCase .Name}}', body.{{camelCase .Name}} as any);
        }
        {{end}}{{else}}if (body.{{camelCase .Name}} !== undefined && body.{{camelCase .Name}} !== null) {
          formData.append('{{camelCase .Name}}', String(body.{{camelCase .Name}}));
        }
        {{end}}{{end}}{{end}}const response = await fetch(url, {
          method: '{{.Method}}',
          {{if .HasBody}}{{if .IsMultipart}}body: formData,
          headers: options?.headers,{{else}}body: JSON.stringify(body),
          headers: {
            'Content-Type': 'application/json',
            ...options?.headers
          },{{end}}{{else}}headers: options?.headers,{{end}}
          credentials: 'include',
          signal: options?.timeout ? AbortSignal.timeout(options.timeout) : undefined
        });

        if (!response.ok) {
          throw await parseGonzoError(response);
        }

        return response.json();
      }
    {{end}}}
    {{end}}
