language: go
file_ext: .go
primitives:
  string: string
  int32: int32
  int64: int64
  float32: float32
  float64: float64
  bool: bool
  file: multipart.FileHeader
type_patterns:
  repeated: "[]%s"
  map: "map[%s]%s"
  default: "struct{}"
default_imports:
  - context
  - github.com/medubin/gonzo/runtime/cookies
  - github.com/medubin/gonzo/runtime/handle
  - github.com/medubin/gonzo/runtime/router
  - github.com/medubin/gonzo/runtime/types
  - github.com/medubin/gonzo/runtime/url
settings:
  package_comment: "// Package generated by API code generator"
  endpoint_imports:
    - context
    - github.com/medubin/gonzo/runtime/cookies
    - github.com/medubin/gonzo/runtime/gerrors
    - github.com/medubin/gonzo/runtime/handle
    - github.com/medubin/gonzo/runtime/url
templates:
  types: |
    {{.Settings.PackageComment}}
    package {{.PackageName}}
    {{$needsValidation := false}}{{$needsMultipart := false}}{{$needsRegexp := false}}{{range .Types}}{{if eq .Kind "struct"}}{{if .IsMultipart}}{{$needsMultipart = true}}{{end}}{{range .Fields}}{{if .Required}}{{$needsValidation = true}}{{end}}{{if .HasValidation}}{{$needsValidation = true}}{{end}}{{if .Pattern}}{{$needsRegexp = true}}{{end}}{{end}}{{end}}{{end}}{{if or $needsValidation $needsMultipart}}
    import (
    {{if $needsValidation}}  "github.com/medubin/gonzo/runtime/gerrors"
    {{end}}{{if $needsRegexp}}  "regexp"
    {{end}}{{if $needsMultipart}}  "mime/multipart"
    {{end}}){{end}}
    {{range .Enums}}
    {{if .Comments}}{{formatComments .Comments}}
    {{end}}type {{.Name}} {{mapType .BaseType}}
    const (
    {{$enumName := .Name}}{{$baseType := .BaseType}}{{range .Values}}	{{$enumName}}_{{.Key}} {{$enumName}} = {{if eq $baseType "string"}}{{quote .Value}}{{else}}{{.Value}}{{end}}
    {{end}})

    // {{.Name}}From{{capitalize .BaseType}} converts a {{.BaseType}} to {{.Name}} enum
    func {{.Name}}From{{capitalize .BaseType}}(v {{mapType .BaseType}}) {{.Name}} {
      switch v {
    {{range .Values}}	case {{if eq $baseType "string"}}{{quote .Value}}{{else}}{{.Value}}{{end}}:
      return {{$enumName}}_{{.Key}}
    {{end}}	default:
    		return {{$enumName}}(v)
      }
    }

    // {{.Name}}To{{capitalize .BaseType}} converts {{.Name}} enum to {{.BaseType}}
    func {{.Name}}To{{capitalize .BaseType}}(e {{.Name}}) {{mapType .BaseType}} {
      return {{mapType .BaseType}}(e)
    }

    // {{.Name}}IsValid checks if the enum value is valid
    func {{.Name}}IsValid(e {{.Name}}) bool {
      switch e {
    {{range .Values}}	case {{$enumName}}_{{.Key}}:
      return true
    {{end}}	default:
      return false
    }
    }{{end}}
    {{range .Types}}
    {{if .Comments}}{{formatComments .Comments}}
    {{end}}{{if eq .Kind "alias"}}type {{.Name}} {{.MappedType}}
    {{else if eq .Kind "struct"}}type {{.Name}} struct {
    {{range .Fields}}{{if .Comments}}{{formatComments .Comments | indent 1}}
    {{end}}  {{capitalize .Name}} *{{.Type}} `{{if .IsMultipart}}form:"{{.FormTag}}"{{else}}json:"{{.JSONTag}}"{{end}}`
    {{end}}}
    {{$structName := .Name}}{{range .Fields}}{{if .Pattern}}
    var _validatePattern_{{$structName}}_{{capitalize .Name}} = regexp.MustCompile({{quote .Pattern}}){{end}}{{end}}

    func (v {{.Name}}) Validate() error {
    {{range .Fields}}{{if .Required}}  if v.{{capitalize .Name}} == nil {
        return gerrors.MissingArgumentError("field '{{.Name}}' is required")
      }
    {{end}}{{if .HasValidation}}  if v.{{capitalize .Name}} != nil {
    {{if .Min}}    if *v.{{capitalize .Name}} < {{.Min}} {
          return gerrors.InvalidArgumentError("field '{{.Name}}' must be >= {{.Min}}")
        }
    {{end}}{{if .Max}}    if *v.{{capitalize .Name}} > {{.Max}} {
          return gerrors.InvalidArgumentError("field '{{.Name}}' must be <= {{.Max}}")
        }
    {{end}}{{if .MinLength}}    if len(*v.{{capitalize .Name}}) < {{.MinLength}} {
          return gerrors.InvalidArgumentError("field '{{.Name}}' must be at least {{.MinLength}} characters")
        }
    {{end}}{{if .MaxLength}}    if len(*v.{{capitalize .Name}}) > {{.MaxLength}} {
          return gerrors.InvalidArgumentError("field '{{.Name}}' must be at most {{.MaxLength}} characters")
        }
    {{end}}{{if .Pattern}}    if !_validatePattern_{{$structName}}_{{capitalize .Name}}.MatchString(*v.{{capitalize .Name}}) {
          return gerrors.InvalidArgumentError("field '{{.Name}}' does not match required pattern")
        }
    {{end}}  }
    {{end}}{{end}}  return nil
    }
    {{else if eq .Kind "repeated"}}type {{.Name}} {{.MappedType}}
    {{else if eq .Kind "map"}}type {{.Name}} {{.MappedType}}
    {{end}}{{end}}
    {{range .Servers}}{{range .Endpoints}}{{if .PathParams}}// URL parameters for {{.Name}}
    type {{.Name}}Url struct {
    {{range .PathParams}}	{{capitalize .Name}} *{{.Type}} `url:"{{.Name}}"`
    {{end}}}{{end}}{{end}}{{end}}

  server: |
    {{.Settings.PackageComment}}
    package {{.Server.PackageName}}

    import (
      "context"
      {{.PackageName}} "{{.TypesPackage}}"
      "github.com/medubin/gonzo/runtime/cookies"
      "github.com/medubin/gonzo/runtime/handle"
      "github.com/medubin/gonzo/runtime/router"
      "github.com/medubin/gonzo/runtime/types"
      "github.com/medubin/gonzo/runtime/url"
    )

    {{if .Server.Comments}}{{formatComments .Server.Comments}}
    {{end}}type {{.Server.Name}} interface {
    {{range .Server.Endpoints}}{{if .Comments}}{{formatComments .Comments | indent 1}}
    {{end}}{{if .Deprecated}}	// Deprecated:{{if .DeprecationMessage}} {{.DeprecationMessage}}{{end}}
    {{end}}	{{.Name}}(ctx context.Context, body {{qual $.PackageName .BodyType}}, cookie cookies.Cookies, url url.URL[{{if .HasParams}}{{qual $.PackageName .Parameters}}{{else}}struct{}{{end}}, {{qual $.PackageName .URLType}}]) (*handle.Response[{{.ReturnType | replace "*" "" | qual $.PackageName}}], error)
    {{end}}}

    func Start{{.Server.Name}}(s {{.Server.Name}}, r *router.Router) error {
    {{range .Server.Endpoints}}	if err := r.Route({{if .IsMultipart}}handle.HandleMultipart{{else}}handle.Handle{{end}}(s.{{.Name}}), &types.RouteInfo{
      Method: "{{.Method}}",
      Path: "{{.Path}}",
      Endpoint: "{{.Name}}",
      Server: "{{$.Server.Name}}",
      RequiresBody: {{.RequiresBody}},
      IsMultipart: {{.IsMultipart}},{{if .AuthScheme}}
      AuthScheme: "{{.AuthScheme}}",{{end}}{{if .DecoratorsLiteral}}
      Decorators: {{.DecoratorsLiteral}},{{end}}
      }); err != nil {
    		return err
    	}
    {{end}}	return nil
    }

  server_impl: |
    {{.Settings.PackageComment}}
    package {{.Server.PackageName}}

    {{if .Server.Comments}}{{formatComments .Server.Comments}}
    {{end}}type {{.Server.Name}}Impl struct {
    	// Add your server implementation fields here
    }

  endpoint: |
    package {{.Server.PackageName}}

    import (
    {{range .Settings.EndpointImports}}	"{{.}}"
    {{end}}	{{.PackageName}} "{{.TypesPackage}}"
    )

    {{if .Endpoint.Comments}}{{formatComments .Endpoint.Comments}}
    {{end}}// {{.Endpoint.Method}} {{.Endpoint.Path}}
    func (s *{{.Server.Name}}Impl) {{.Endpoint.Name}}(ctx context.Context, body {{qual $.PackageName .Endpoint.BodyType}}, cookie cookies.Cookies, url url.URL[{{if .Endpoint.HasParams}}{{qual $.PackageName .Endpoint.Parameters}}{{else}}struct{}{{end}}, {{qual $.PackageName .Endpoint.URLType}}]) (*handle.Response[{{.Endpoint.ReturnType | replace "*" "" | qual $.PackageName}}], error) {
      return nil, gerrors.UnimplementedError("{{.Endpoint.Name}}")
    }
